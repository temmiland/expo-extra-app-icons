name: Auditing

on:
    workflow_dispatch:
    schedule:
        - cron: "00 00 * * *"
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    bun-audit:
        name: bun audit
        runs-on: ubuntu-latest
        outputs:
            found: ${{ steps.audit.outputs.found }}
            summary: ${{ steps.audit.outputs.summary }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Use bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
              with:
                  bun-version: 1
                  no-cache: true

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run bun audit
              id: audit
              env:
                  # Accepted, triaged findings: all live exclusively in transitive
                  # devDependencies (expo/expo-module-scripts/react-native build+test
                  # tooling) that are never installed for consumers of this package
                  # (npm only installs "dependencies" + "peerDependencies"). No fixed
                  # release exists that doesn't force a conflicting major version on
                  # a sibling dependency, or (lodash) no fixed release exists at all.
                  # Re-review this list whenever `bun audit` gains new findings for
                  # these packages, and drop entries once a compatible fix lands.
                  IGNORE_ADVISORIES: >-
                      GHSA-f886-m6hf-6m8v
                      GHSA-mh29-5h37-fv8m
                      GHSA-h67p-54hq-rp68
                      GHSA-xxjr-mmjv-4gpg
                      GHSA-r5fr-rjxr-66jc
                      GHSA-f23m-r3pf-42rh
                      GHSA-3ppc-4f35-3m26
                      GHSA-7r86-cg39-jmmj
                      GHSA-23c5-xmqv-rm74
                      GHSA-3v7f-55p6-f55p
                      GHSA-c2c7-rcm5-vvqj
                      GHSA-w5hq-g745-h8pq
                      GHSA-58qx-3vcg-4xpx
                      GHSA-96hv-2xvq-fx4p
              run: |
                  set +e
                  IGNORE_FLAGS=()
                  for id in $IGNORE_ADVISORIES; do
                      IGNORE_FLAGS+=(--ignore="$id")
                  done
                  OUTPUT=$(bun audit "${IGNORE_FLAGS[@]}" 2>&1)
                  EXIT_CODE=$?
                  set -e
                  echo "$OUTPUT"

                  DELIM="EOF_$(openssl rand -hex 8)"
                  {
                      echo "summary<<$DELIM"
                      echo "$OUTPUT"
                      echo "$DELIM"
                  } >> "$GITHUB_OUTPUT"

                  if [ "$EXIT_CODE" -ne 0 ]; then
                      echo "found=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "found=false" >> "$GITHUB_OUTPUT"
                  fi

    # Opens (or updates) a single tracking issue instead of spamming a new one
    # per run. Needs the repo's Actions setting "Read and write permissions"
    # enabled so the built-in token can create issues.
    report:
        needs: bun-audit
        if: always() && needs.bun-audit.outputs.found == 'true'
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - name: Create or update security issue
              env:
                  GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
                  API_URL: ${{ gitea.api_url }}
                  REPO: ${{ gitea.repository }}
                  RUN_URL: ${{ gitea.server_url }}/${{ gitea.repository }}/actions/runs/${{ gitea.run_id }}
                  SUMMARY: ${{ needs.bun-audit.outputs.summary }}
              run: |
                  TITLE="bun audit: offene Funde"

                  BODY="Automatisch erkannte Sicherheitsfunde vom $(date -u +'%Y-%m-%d %H:%M UTC') ([Lauf]($RUN_URL)).

                  \`\`\`
                  $SUMMARY
                  \`\`\`"

                  EXISTING=$(curl -s -H "Authorization: token $GITEA_TOKEN" \
                      "$API_URL/repos/$REPO/issues?state=open&type=issues&limit=50" \
                      | jq -r --arg t "$TITLE" '[.[] | select(.title == $t)] | .[0].number // empty')

                  if [ -n "$EXISTING" ]; then
                      echo "Updating issue #$EXISTING"
                      jq -n --arg body "$BODY" '{body: $body}' \
                          | curl -s -X PATCH -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues/$EXISTING" -d @-
                      jq -n --arg body "**Neuer Scan mit offenen Funden:**

                  $BODY" '{body: $body}' \
                          | curl -s -X POST -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues/$EXISTING/comments" -d @-
                  else
                      echo "Creating new issue"
                      jq -n --arg title "$TITLE" --arg body "$BODY" '{title: $title, body: $body}' \
                          | curl -s -X POST -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues" -d @-
                  fi
